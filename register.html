<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>給水スポット登録 | Refillぐんま</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
:root {
  --water-deep: #0077B6;
  --water-mid:  #00B4D8;
  --water-light:#90E0EF;
  --water-pale: #CAF0F8;
  --water-foam: #EAF8FD;
  --accent:     #FF6B6B;
  --gold:       #FFB703;
  --green:      #52B788;
  --text-dark:  #023E58;
  --text-mid:   #4A7A8A;
  --text-light: #8AAABB;
  --white:      #FFFFFF;
  --shadow-soft: 0 4px 20px rgba(0,119,182,0.15);
  --r-sm: 10px;
  --r-md: 16px;
  --r-lg: 24px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--water-foam);
  color:var(--text-dark);
  min-height:100vh;
}

header{
  background:linear-gradient(135deg,var(--water-deep) 0%,var(--water-mid) 100%);
  padding:12px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:0 2px 16px rgba(0,119,182,0.35);
  position:sticky;
  top:0;
  z-index:100;
}
.logo{font-family:'Outfit',sans-serif;color:white;}
.logo .main{font-size:18px;font-weight:800;}
.logo .sub{font-size:10px;font-weight:300;opacity:.85;letter-spacing:1px;}
.btn-back{
  background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.35);
  color:white;
  padding:7px 14px;
  border-radius:20px;
  font-size:12px;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:5px;
}

/* AUTH SCREEN */
.auth-screen{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,var(--water-deep) 0%,var(--water-mid) 100%);
}
.auth-card{
  background:white;
  border-radius:var(--r-lg);
  padding:40px 36px;
  width:100%;
  max-width:380px;
  box-shadow:0 20px 60px rgba(0,50,80,.3);
  text-align:center;
}
.auth-icon{font-size:48px;margin-bottom:16px;}
.auth-title{
  font-family:'Outfit',sans-serif;
  font-size:24px;
  font-weight:800;
  color:var(--water-deep);
  margin-bottom:6px;
}
.auth-subtitle{font-size:13px;color:var(--text-light);margin-bottom:28px;}
.auth-input{
  width:100%;
  padding:12px 16px;
  border:2px solid var(--water-light);
  border-radius:var(--r-sm);
  font-size:15px;
  font-family:'Noto Sans JP',sans-serif;
  margin-bottom:16px;
  outline:none;
  transition:border-color .2s;
  text-align:center;
  letter-spacing:3px;
}
.auth-input:focus{border-color:var(--water-mid);}
.auth-btn{
  width:100%;
  padding:13px;
  background:linear-gradient(135deg,var(--water-deep),var(--water-mid));
  color:white;
  border:none;
  border-radius:var(--r-sm);
  font-size:15px;
  font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;
  transition:all .2s;
}
.auth-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,119,182,.4);}
.auth-error{color:var(--accent);font-size:12px;margin-top:10px;}

/* FORM CONTAINER */
.form-container{
  max-width:720px;
  margin:0 auto;
  padding:24px 20px 60px;
}

.form-card{
  background:white;
  border-radius:var(--r-lg);
  padding:28px;
  box-shadow:var(--shadow-soft);
  margin-bottom:20px;
  border:1px solid var(--water-pale);
}

.form-card-title{
  font-family:'Outfit',sans-serif;
  font-size:16px;
  font-weight:800;
  color:var(--water-deep);
  margin-bottom:20px;
  padding-bottom:12px;
  border-bottom:2px solid var(--water-pale);
  display:flex;
  align-items:center;
  gap:8px;
}

.form-group{
  margin-bottom:18px;
}
label{
  display:block;
  font-size:13px;
  font-weight:700;
  color:var(--text-mid);
  margin-bottom:6px;
}
label .required{
  color:var(--accent);
  margin-left:3px;
  font-size:11px;
}

input[type=text],input[type=email],input[type=tel],
select,textarea{
  width:100%;
  padding:10px 13px;
  border:1.5px solid var(--water-light);
  border-radius:var(--r-sm);
  font-size:14px;
  font-family:'Noto Sans JP',sans-serif;
  color:var(--text-dark);
  background:var(--water-foam);
  outline:none;
  transition:border-color .2s,background .2s;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--water-mid);
  background:white;
}
textarea{resize:vertical;min-height:80px;}

/* CATEGORY SELECTOR */
.cat-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}
.cat-btn{
  border:2px solid var(--water-light);
  border-radius:var(--r-md);
  padding:14px 10px;
  cursor:pointer;
  text-align:center;
  transition:all .2s;
  background:var(--water-foam);
}
.cat-btn:hover{border-color:var(--water-mid);background:white;}
.cat-btn.selected-public{border-color:var(--water-mid);background:#d0eeff;}
.cat-btn.selected-shop  {border-color:var(--green);background:#d5f5e8;}
.cat-btn.selected-byoc  {border-color:var(--gold);background:#fff3cd;}
.cat-icon{font-size:28px;margin-bottom:6px;}
.cat-name{font-size:12px;font-weight:700;color:var(--text-dark);}
.cat-desc{font-size:10px;color:var(--text-light);margin-top:2px;}

/* WEEKDAY SELECTOR */
.weekday-grid{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
.day-btn{
  padding:5px 12px;
  border:1.5px solid var(--water-light);
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
  background:var(--water-foam);
  transition:all .15s;
  color:var(--text-mid);
}
.day-btn.active{
  background:var(--water-mid);
  border-color:var(--water-mid);
  color:white;
  font-weight:700;
}

/* MAP PICKER */
#locationMap{
  height:250px;
  border-radius:var(--r-sm);
  border:1.5px solid var(--water-light);
  margin-top:10px;
}

.coord-display{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}

.loc-btn-group{
  display:flex;
  gap:8px;
  margin-top:10px;
}
.loc-btn{
  flex:1;
  padding:9px;
  border-radius:var(--r-sm);
  border:1.5px solid var(--water-light);
  background:var(--water-foam);
  font-size:12px;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;
  transition:all .2s;
  color:var(--text-mid);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  font-weight:500;
}
.loc-btn:hover{background:var(--water-pale);border-color:var(--water-mid);}
.loc-btn.primary{
  background:var(--water-mid);
  border-color:var(--water-mid);
  color:white;
}
.loc-btn.primary:hover{background:var(--water-deep);}

/* GEOCODE SPINNER */
.geo-status{
  font-size:11px;
  color:var(--text-light);
  margin-top:6px;
  min-height:16px;
}
.geo-status.ok{color:var(--green);}
.geo-status.err{color:var(--accent);}

/* SUBMIT BTN */
.submit-btn{
  width:100%;
  padding:15px;
  background:linear-gradient(135deg,var(--water-deep),var(--water-mid));
  color:white;
  border:none;
  border-radius:var(--r-md);
  font-size:16px;
  font-weight:700;
  font-family:'Noto Sans JP',sans-serif;
  cursor:pointer;
  transition:all .25s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  box-shadow:0 4px 16px rgba(0,119,182,.35);
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,119,182,.45);}
.submit-btn:disabled{opacity:.6;transform:none;cursor:not-allowed;}

/* TOAST */
.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%) translateY(100px);
  background:var(--text-dark);
  color:white;
  padding:12px 24px;
  border-radius:30px;
  font-size:13px;
  font-weight:500;
  transition:transform .35s ease;
  z-index:9999;
  white-space:nowrap;
  box-shadow:0 8px 24px rgba(0,0,0,.25);
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--green);}
.toast.error  {background:var(--accent);}

/* CONDITIONAL FIELDS */
.shop-fields{display:none;}
.byoc-fields{display:none;}

/* DIVIDER */
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

@media(max-width:600px){
  .cat-grid{grid-template-columns:1fr 1fr;}
  .field-row{grid-template-columns:1fr;}
  .coord-display{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="authScreen" class="auth-screen">
  <div class="auth-card">
    <div class="auth-icon">💧</div>
    <div class="auth-title">Refillぐんま</div>
    <div class="auth-subtitle">スポット登録にはパスワードが必要です</div>
    <input type="password" id="pwInput" class="auth-input" placeholder="パスワードを入力"
      onkeydown="if(event.key==='Enter')checkPW()">
    <button class="auth-btn" onclick="checkPW()">ログイン</button>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- MAIN FORM -->
<div id="mainContent" style="display:none">
  <header>
    <div class="logo">
      <div class="main">💧 Refillぐんま</div>
      <div class="sub">スポット登録</div>
    </div>
    <a href="map.html" class="btn-back">← マップへ戻る</a>
  </header>

  <div class="form-container">

    <!-- CATEGORY -->
    <div class="form-card">
      <div class="form-card-title">📂 スポットの種類<span style="color:var(--accent);font-size:12px"> *必須</span></div>
      <div class="cat-grid">
        <div class="cat-btn" id="cat-public" onclick="selectCat('public')">
          <div class="cat-icon">🚰</div>
          <div class="cat-name">公共給水</div>
          <div class="cat-desc">公園・役所など</div>
        </div>
        <div class="cat-btn" id="cat-shop" onclick="selectCat('shop')">
          <div class="cat-icon">🏪</div>
          <div class="cat-name">協力店舗</div>
          <div class="cat-desc">飲食店・カフェ等</div>
        </div>
        <div class="cat-btn" id="cat-byoc" onclick="selectCat('byoc')">
          <div class="cat-icon">🧴</div>
          <div class="cat-name">BYOC対応</div>
          <div class="cat-desc">マイ容器持参歓迎</div>
        </div>
      </div>
    </div>

    <!-- BASIC INFO -->
    <div class="form-card">
      <div class="form-card-title">📝 基本情報</div>

      <div class="form-group">
        <label>スポット名<span class="required">*</span></label>
        <input type="text" id="f_name" placeholder="例：前橋中央公園 給水スポット" maxlength="80">
      </div>

      <div class="form-group">
        <label>お水の提供方法<span class="required">*</span></label>
        <select id="f_water_type">
          <option value="">選択してください</option>
          <option value="水道水（無料）">🚰 水道水（無料）</option>
          <option value="浄水（無料）">💧 浄水（無料）</option>
          <option value="湧き水（無料）">🌊 湧き水（無料）</option>
          <option value="ウォーターサーバー（無料）">🏧 ウォーターサーバー（無料）</option>
          <option value="ドリンク提供（マイ容器割引）">☕ ドリンク提供（マイ容器割引）</option>
          <option value="量り売り（マイ容器対応）">⚖️ 量り売り（マイ容器対応）</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label>スポットの説明</label>
        <textarea id="f_description" placeholder="利用方法・特記事項など"></textarea>
      </div>
    </div>

    <!-- SHOP FIELDS -->
    <div class="form-card shop-fields byoc-fields" id="shopFields">
      <div class="form-card-title">🕐 営業情報</div>

      <div class="form-group field-row">
        <div>
          <label>営業開始時間</label>
          <input type="text" id="f_open" placeholder="例：9:00">
        </div>
        <div>
          <label>営業終了時間</label>
          <input type="text" id="f_close" placeholder="例：18:00">
        </div>
      </div>

      <div class="form-group">
        <label>定休日</label>
        <div class="weekday-grid" id="closedDays">
          <div class="day-btn" data-day="月" onclick="toggleDay(this)">月</div>
          <div class="day-btn" data-day="火" onclick="toggleDay(this)">火</div>
          <div class="day-btn" data-day="水" onclick="toggleDay(this)">水</div>
          <div class="day-btn" data-day="木" onclick="toggleDay(this)">木</div>
          <div class="day-btn" data-day="金" onclick="toggleDay(this)">金</div>
          <div class="day-btn" data-day="土" onclick="toggleDay(this)">土</div>
          <div class="day-btn" data-day="日" onclick="toggleDay(this)">日</div>
          <div class="day-btn" data-day="祝" onclick="toggleDay(this)">祝</div>
          <div class="day-btn" data-day="不定休" onclick="toggleDay(this)">不定休</div>
          <div class="day-btn" data-day="なし" onclick="toggleDay(this)">なし</div>
        </div>
      </div>

      <div class="form-group field-row">
        <div>
          <label>電話番号</label>
          <input type="tel" id="f_phone" placeholder="027-XXX-XXXX">
        </div>
        <div>
          <label>メールアドレス</label>
          <input type="email" id="f_email" placeholder="info@example.com">
        </div>
      </div>
    </div>

    <!-- LOCATION -->
    <div class="form-card">
      <div class="form-card-title">📍 場所の情報</div>

      <div class="form-group">
        <label>住所<span class="required">*</span></label>
        <div style="display:flex;gap:8px;">
          <input type="text" id="f_address" placeholder="群馬県前橋市大手町2-12-1" style="flex:1">
          <button class="loc-btn" style="flex:0 0 auto;padding:10px 14px;" onclick="geocodeAddress()">
            🔍 検索
          </button>
        </div>
        <div class="geo-status" id="geoStatus"></div>
      </div>

      <div class="loc-btn-group">
        <button class="loc-btn primary" onclick="useGPS()">📱 GPS取得</button>
        <button class="loc-btn" onclick="resetMap()">🗺️ 地図で選択</button>
      </div>

      <div id="locationMap"></div>

      <div class="coord-display">
        <div>
          <label style="font-size:11px">緯度 (Latitude)</label>
          <input type="text" id="f_lat" placeholder="36.3915" readonly style="background:var(--water-foam)">
        </div>
        <div>
          <label style="font-size:11px">経度 (Longitude)</label>
          <input type="text" id="f_lng" placeholder="139.0607" readonly style="background:var(--water-foam)">
        </div>
      </div>
    </div>

    <!-- SUBMIT -->
    <button class="submit-btn" id="submitBtn" onclick="submitForm()">
      💧 スポットを登録する
    </button>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════
//  設定
// ══════════════════════════════
const CONFIG = {
  // パスワード（運用時は変更してください）
  PASSWORD: 'refill2024gunma',

  // Google Apps Script WebApp URL
  GAS_URL: 'https://script.google.com/macros/s/YOUR_GAS_SCRIPT_ID/exec',

  // 東京大学 CSVアドレスマッチングAPI
  GEOCODE_API: 'https://geocoding.geo.census.gov/geocoder/locations/address',

  // 群馬県デフォルト座標
  DEFAULT_LAT: 36.39,
  DEFAULT_LNG: 139.06,
};

// ══════════════════════════════
//  Auth
// ══════════════════════════════
function checkPW() {
  const val = document.getElementById('pwInput').value;
  if (val === CONFIG.PASSWORD) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('mainContent').style.display = 'block';
    initLocationMap();
  } else {
    document.getElementById('authError').textContent = 'パスワードが違います。';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}

// ══════════════════════════════
//  カテゴリ選択
// ══════════════════════════════
let selectedCategory = '';
function selectCat(cat) {
  selectedCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.className = 'cat-btn';
  });
  document.getElementById(`cat-${cat}`).classList.add(`selected-${cat}`);

  // 店舗フィールド表示切替
  const shopFields = document.getElementById('shopFields');
  if (cat === 'shop' || cat === 'byoc') {
    shopFields.style.display = 'block';
  } else {
    shopFields.style.display = 'none';
  }
}

// ══════════════════════════════
//  定休日
// ══════════════════════════════
function toggleDay(el) {
  el.classList.toggle('active');
}

function getClosedDays() {
  const active = [];
  document.querySelectorAll('#closedDays .day-btn.active').forEach(b => {
    active.push(b.dataset.day);
  });
  return active.length ? active.join('・') : '';
}

// ══════════════════════════════
//  地図ピッカー
// ══════════════════════════════
let locMap, locMarker;

function initLocationMap() {
  locMap = L.map('locationMap').setView([CONFIG.DEFAULT_LAT, CONFIG.DEFAULT_LNG], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution:'© OpenStreetMap contributors', maxZoom:19
  }).addTo(locMap);

  locMap.on('click', e => {
    setMapMarker(e.latlng.lat, e.latlng.lng);
  });
}

function setMapMarker(lat, lng) {
  if (locMarker) locMap.removeLayer(locMarker);
  locMarker = L.marker([lat, lng], {
    icon: L.divIcon({
      className:'',
      html:`<div style="background:var(--water-mid);width:28px;height:28px;border-radius:50%;border:3px solid white;box-shadow:0 3px 10px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:14px;">💧</div>`,
      iconSize:[28,28], iconAnchor:[14,14]
    })
  }).addTo(locMap);
  document.getElementById('f_lat').value = lat.toFixed(6);
  document.getElementById('f_lng').value = lng.toFixed(6);
}

function resetMap() {
  locMap.setView([CONFIG.DEFAULT_LAT, CONFIG.DEFAULT_LNG], 11);
  showToast('地図をクリックして場所を指定してください', '');
}

// ══════════════════════════════
//  GPS取得
// ══════════════════════════════
function useGPS() {
  if (!navigator.geolocation) { showToast('位置情報をサポートしていません', 'error'); return; }
  showToast('📱 GPS取得中…', '');
  navigator.geolocation.getCurrentPosition(pos => {
    const { latitude: lat, longitude: lng } = pos.coords;
    setMapMarker(lat, lng);
    locMap.setView([lat, lng], 16);
    showToast('✅ 現在地を取得しました', 'success');
  }, () => showToast('位置情報を取得できませんでした', 'error'));
}

// ══════════════════════════════
//  アドレスマッチング (東大CSVアドレスマッチングAPI)
// ══════════════════════════════
async function geocodeAddress() {
  const addr = document.getElementById('f_address').value.trim();
  if (!addr) { showToast('住所を入力してください', 'error'); return; }

  const statusEl = document.getElementById('geoStatus');
  statusEl.textContent = '🔍 住所を検索中…';
  statusEl.className = 'geo-status';

  try {
    // 東京大学空間情報科学研究センター アドレスマッチングAPI
    // CORSの制約上、GASプロキシ経由で呼び出す
    const url = `${CONFIG.GAS_URL}?action=geocode&address=${encodeURIComponent(addr)}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.lat && data.lng) {
      setMapMarker(data.lat, data.lng);
      locMap.setView([data.lat, data.lng], 16);
      statusEl.textContent = `✅ 住所から座標を取得しました (精度: ${data.score || 'OK'})`;
      statusEl.className = 'geo-status ok';
    } else {
      throw new Error('座標が取得できませんでした');
    }
  } catch(e) {
    statusEl.textContent = '⚠️ 座標の自動取得に失敗しました。地図で手動指定してください。';
    statusEl.className = 'geo-status err';
  }
}

// ══════════════════════════════
//  フォーム送信 → GAS
// ══════════════════════════════
async function submitForm() {
  // バリデーション
  const errors = [];
  if (!selectedCategory)                           errors.push('スポットの種類を選択してください');
  if (!document.getElementById('f_name').value.trim())    errors.push('スポット名を入力してください');
  if (!document.getElementById('f_water_type').value)     errors.push('お水の提供方法を選択してください');
  if (!document.getElementById('f_address').value.trim()) errors.push('住所を入力してください');
  if (!document.getElementById('f_lat').value)            errors.push('地図で位置を指定してください');

  if (errors.length) { showToast('⚠️ ' + errors[0], 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '⏳ 送信中…';

  const hours = (document.getElementById('f_open').value || '') + 
                (document.getElementById('f_close').value ? `〜${document.getElementById('f_close').value}` : '');

  const payload = {
    action:      'addSpot',
    id:          Date.now().toString(),
    name:        document.getElementById('f_name').value.trim(),
    category:    selectedCategory,
    address:     document.getElementById('f_address').value.trim(),
    lat:         parseFloat(document.getElementById('f_lat').value),
    lng:         parseFloat(document.getElementById('f_lng').value),
    water_type:  document.getElementById('f_water_type').value,
    description: document.getElementById('f_description').value.trim(),
    hours:       hours || '終日',
    closed_days: getClosedDays(),
    phone:       document.getElementById('f_phone').value.trim(),
    email:       document.getElementById('f_email').value.trim(),
    byoc:        selectedCategory === 'byoc',
    registered:  new Date().toISOString().slice(0,10),
  };

  try {
    const res = await fetch(CONFIG.GAS_URL, {
      method:  'POST',
      mode:    'cors',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    const data = await res.json();
    if (data.status === 'ok') {
      showToast('✅ スポットを登録しました！', 'success');
      setTimeout(() => window.location.href = 'map.html', 2000);
    } else {
      throw new Error(data.message || '登録に失敗しました');
    }
  } catch(e) {
    showToast('❌ 送信エラー: ' + e.message, 'error');
    btn.disabled = false;
    btn.innerHTML = '💧 スポットを登録する';
  }
}

// ══════════════════════════════
//  Toast
// ══════════════════════════════
let toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${type || ''}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
